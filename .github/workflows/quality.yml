name: Wuyun quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run package validator
        run: python3 wuyun/scripts/validate_skill.py .

      - name: Run offline regression suite
        run: python3 wuyun/scripts/run_eval.py .

      - name: Run publish quality gate
        run: python3 wuyun/scripts/quality_gate.py . --skip-preflight

      - name: Check installer syntax
        run: bash -n install.sh
